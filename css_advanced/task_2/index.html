<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmileSchool</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>


  <header class="hero-section">


    <nav>

      <div class="logo">
        <img src="../images/logo.png" alt="logo">
        
      </div>


      <div class="nav-links">
        <a href="#">COURSES</a>
        <a href="#">PRICING</a>
        <a href="#">LOGIN</a>
      </div>


    </nav>



    <div class="hero-content">

      <h1>Get schooled</h1>


      <div class="keywords">
        <span>SMILES</span>
        <span>GRIN</span>
        <span>LAUGH</span>
      </div>


      <button>
        REGISTER FOR FREE
      </button>


    </div>



    <section class="pros">


      <h2>
        <span>Learn</span> from the pros
      </h2>


      <div class="pros-container">


        <div class="pro-card">

          <img src="../images/avatar1.png">

          <h3>Phillip Massey</h3>

          <p><i>« Smile of the year »</i></p>

          <p><i>2018 - 2019</i></p>

        </div>



        <div class="pro-card">

          <img src="../images/avatar2.png">

          <h3>Nannie Lawrence</h3>

          <p><i>« Best little smile »</i></p>

          <p><i>2018 - 2019</i></p>

        </div>



        <div class="pro-card">

          <img src="../images/avatar3.png">

          <h3>Bruce Walters</h3>

          <p><i>« Best Smile »</i></p>

          <p><i>2019 - 2020</i></p>

        </div>



        <div class="pro-card">

          <img src="../images/avatar4.png">

          <h3>Henry Hughes</h3>

          <p><i>« Best Smile »</i></p>

          <p><i>2019 - 2020</i></p>

        </div>


      </div>


    </section>


  </header>


</body>

</html>
