<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmileSchool</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>

    <nav>

      <div class="logo">
        <img src="../images/logo.png" alt="SmileSchool">
      </div>

      <div class="nav-links">
        <a href="#">COURSES</a>
        <a href="#">PRICING</a>
        <a href="#">LOGIN</a>
      </div>

    </nav>


    <section class="hero">

      <h1>Get schooled</h1>

      <div class="keywords">
        <span>SMILES</span>
        <span>GRIN</span>
        <span>LAUGH</span>
      </div>

      <button class="button">
        REGISTER FOR FREE
      </button>

    </section>


  </header>



  <section class="pros">

    <h2>
      <span>Learn</span> from the pros
    </h2>


    <div class="pros-container">


      <div class="pro-card">

        <img src="../images/avatar1.png" alt="Phillip Massey">

        <h3>Phillip Massey</h3>

        <p>« Smile of the year »</p>

        <p>2018 - 2019</p>

      </div>



      <div class="pro-card">

        <img src="../images/avatar2.png" alt="Nannie Lawrence">

        <h3>Nannie Lawrence</h3>

        <p>« Best little smile »</p>

        <p>2018 - 2019</p>

      </div>



      <div class="pro-card">

        <img src="../images/avatar3.png" alt="Bruce Walters">

        <h3>Bruce Walters</h3>

        <p>« Best Smile »</p>

        <p>2019 - 2020</p>

      </div>



      <div class="pro-card">

        <img src="../images/avatar4.png" alt="Henry Hughes">

        <h3>Henry Hughes</h3>

        <p>« Smile winner »</p>

        <p>2019 - 2020</p>

      </div>


    </div>


  </section>


</body>

</html>
